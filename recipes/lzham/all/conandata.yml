patches:
  "0.0+git.20220103":
    - patch_file: "patches/aarch64-yield.patch"
      patch_description: "Uses 'yield' rather than 'pause' mnemonic to fix aarch64 build"
    - patch_file: "patches/cmake-min-req-swap.patch"
      patch_description: "Puts cmake_minimum_required before project in all CMakeLists"
    - patch_file: "patches/fix-osx.patch"
      patch_description: "Fixes building on OSX"
    - patch_file: "patches/use-lzham-types.patch"
      patch_description: "Uses typedefs prefixed with LZHAM to fix linux build errors"
    - patch_file: "patches/cmake-rm-tests.patch"
      patch_description: "Skips building of lzhamtest for CMake"
    - patch_file: "patches/msvc-conan.patch"
      patch_description: "Skips building of lzhamtest and examples for MSVC, and injects conan toolchain for MSVC"
